<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="petalLight" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4caf7d"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </radialGradient>
    <radialGradient id="petalDark" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2e8b57"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </radialGradient>
    <radialGradient id="petalMid" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3aaa68"/>
      <stop offset="100%" stop-color="#1f5c38"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8f0c6"/>
      <stop offset="60%" stop-color="#2e8b57"/>
      <stop offset="100%" stop-color="#1a3d2b"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3d2b" flood-opacity="0.25"/>
    </filter>
  </defs>



  <g transform="rotate(0, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalLight)" filter="url(#shadow)" opacity="0.95"/>
  </g>
  <g transform="rotate(60, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalDark)" filter="url(#shadow)" opacity="0.95"/>
  </g>
  <g transform="rotate(120, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalMid)" filter="url(#shadow)" opacity="0.95"/>
  </g>
  <g transform="rotate(180, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalLight)" filter="url(#shadow)" opacity="0.95"/>
  </g>
  <g transform="rotate(240, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalDark)" filter="url(#shadow)" opacity="0.95"/>
  </g>
  <g transform="rotate(300, 250, 250)">
    <ellipse cx="250" cy="148" rx="52" ry="95" fill="url(#petalMid)" filter="url(#shadow)" opacity="0.95"/>
  </g>

  <circle cx="250" cy="250" r="52" fill="url(#centerGlow)" filter="url(#shadow)"/>
  <circle cx="250" cy="250" r="18" fill="#ffffff" opacity="0.35"/>
</svg>
